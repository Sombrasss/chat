<script>
  let deferredPrompt;

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;

    const installBtn = document.getElementById('installPWA');
    const manualInstall = document.getElementById('manualInstall');
    
    installBtn.style.display = 'inline-block';
    if (manualInstall) manualInstall.style.display = 'none'; // Oculta instrução

    installBtn.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('Usuário aceitou instalar o app');
          } else {
            console.log('Usuário recusou instalar o app');
          }
          deferredPrompt = null;
        });
      }
    });
  });

  // Se o evento nunca acontecer (ex: desktop), mostre a instrução manual após 5s
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!deferredPrompt) {
        const manualInstall = document.getElementById('manualInstall');
        if (manualInstall) manualInstall.style.display = 'block';
      }
    }, 5000);
  });
</script>
